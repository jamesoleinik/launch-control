name: ❓ Question
description: Ask about how something works in the series or the repo
title: "[Question] "
labels: ["question"]
body:
  - type: input
    id: episode
    attributes:
      label: Related episode (if any)
      placeholder: "Ep N — <title>, or N/A"
    validations:
      required: false
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: |
        Be specific. "How do I configure X?" "Why does the Y script use Z instead of W?"
        For broader Dataverse / Power Platform questions, the [Power Platform community](https://powerusers.microsoft.com/) is a better venue.
    validations:
      required: true
