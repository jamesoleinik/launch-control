# yaml-language-server: $schema=https://aka.ms/teams-toolkit/v1.7/yaml.schema.json
#
# Microsoft 365 Agents Toolkit project file for the Episode 13 Launch Control
# declarative agent. The toolkit owns this file — re-run the wizard if the
# schema drifts.

version: v1.7

projectId: c0a1a1c0-13a0-4ec2-9d10-launchcontrol13

environmentFolderPath: ./env

provision:
  # 1. Create or reuse a Teams app registration.
  - uses: teamsApp/create
    with:
      name: Launch Control MCP-${{TEAMSFX_ENV}}
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # 2. Create an Entra app registration for the MCP action's OAuth.
  - uses: aadApp/create
    with:
      name: LaunchControlMcp-${{TEAMSFX_ENV}}
      generateClientSecret: true
      signInAudience: AzureADMyOrg
    writeToEnvironmentFile:
      clientId: AAD_APP_CLIENT_ID
      clientSecret: SECRET_AAD_APP_CLIENT_SECRET
      objectId: AAD_APP_OBJECT_ID
      tenantId: AAD_APP_TENANT_ID
      authority: AAD_APP_OAUTH_AUTHORITY
      authorityHost: AAD_APP_OAUTH_AUTHORITY_HOST

  # 3. Update the Entra app reg to add the Copilot redirect URI.
  - uses: aadApp/update
    with:
      manifestPath: ./aad.manifest.json
      outputFilePath: ./build/aad.manifest.${{TEAMSFX_ENV}}.json

  # 4. Register the MCP server as an OAuth-protected plugin authorization.
  - uses: oauth/register
    with:
      name: LaunchControlMcpAuth
      flow: authorizationCode
      appId: ${{TEAMS_APP_ID}}
      clientId: ${{AAD_APP_CLIENT_ID}}
      clientSecret: ${{SECRET_AAD_APP_CLIENT_SECRET}}
      identityProvider: Custom
      refreshUrl: https://login.microsoftonline.com/${{AAD_APP_TENANT_ID}}/oauth2/v2.0/token
      scopes:
        - https://${{DATAVERSE_HOST}}/.default
      authorizationEndpoint: https://login.microsoftonline.com/${{AAD_APP_TENANT_ID}}/oauth2/v2.0/authorize
      tokenExchangeEndpoint: https://login.microsoftonline.com/${{AAD_APP_TENANT_ID}}/oauth2/v2.0/token
      isPKCEEnabled: true
    writeToEnvironmentFile:
      configurationId: OAUTH_REGISTRATION_ID

  # 5. Build and validate the app package.
  - uses: file/createOrUpdateJsonFile
    with:
      target: ./build/appPackage/manifest.${{TEAMSFX_ENV}}.json
      content: {}
  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build
  - uses: teamsApp/validateAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

  # 6. Upload to Teams App Catalog (tenant side-load).
  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

deploy: []

publish:
  - uses: teamsApp/publishAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
    writeToEnvironmentFile:
      publishedAppId: TEAMS_APP_PUBLISHED_APP_ID
